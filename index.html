<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div class="header">
        <p class="title">Rock Paper Scissors</p>
    </div>
    <div class="computer">
        <p>Computer</p>
        <div class="points">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <div class="cards">
            <button class="card">🎴</button>
            <button class="card">🎴</button>
            <button class="card">🎴</button>
        </div>
    </div>
    <div class="result">
        <p>You win/You lose</p>
        <div class="arena">
            <p>Rock/Paper/Scissors</p>
            <p>vs</p>
            <p>Rock/Paper/Scissors</p>
        </div>
    </div>
    <div class="player">
        <p>Player</p>
        <div class="points">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <div class="cards">
            <button class="card player-card">✊</button>
            <button class="card player-card">✋</button>
            <button class="card player-card">✌️</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
