<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div class="header">
        <p>Rock Paper Scissors</p>
    </div>
    <div class="computer">
        <p>Computer</p>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <p>🎴</p>
        <p>🎴</p>
        <p>🎴</p>
    </div>
    <div class="arena">
        <p>✊/✋/✌️</p>
        <p>You win/You lose</p>
        <p>Rock/Paper/Scissors vs Rock/Paper/Scissors</p>
        <p>✊/✋/✌️</p>
    </div>
    <div class="player">
        <p>Player</p>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <p>✊</p>
        <p>✋</p>
        <p>✌️</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
